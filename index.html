<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>SignUp Form</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>

	<!--This is the container for the sidebar-->
	<div id="photo-container">
		<img src="./images/puka-doncic.jpg" alt="Luka Doncic">
		<div id="h1-container">
			<svg></svg>
			<h1 id="heading">Luka Dončić</h1>
		</div>
	</div>

	<!--This is the container for the main content-->
	<div id="main-container">

		<!--This is the container for the top message-->
		<div id="message">
			<p>"In any series we're in, we are going to go in believing we can win. If you don't believe it, you're not supposed to be here. You have to believe it every time."</p>
			<p>Luka Dončić</p>
		</div>
		<!--This is the container for the form-->
		<fieldset id="form-container">
			<h2 id="form-header">Let's Do This!</h2>
			<form method="post">
				<label for="first_name">First Name</label>
				<input name="first_name" type="text" placeholder="Luka" required >
				<label for="last_name">Last Name</label>
				<input name="last_name" type="text" placeholder="Dončić" required >
				<label for="email">Email</label>
				<input name="email" type="email" required >
				<label for="phone_number">Phone Number</label>
				<input name="phone_number" type="number" minlength="10" maxlength="11" required >
				<label for="password">Password</label>
				<input name="password" type="password" minlength="8" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters" required >
				<label for="confirm_password">Confirm Password</label>
				<input name="password" type="password" minlength="8" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters" required >
			</form>
		</fieldset>

		<!-- This is the container for submit section-->
		<div id="submit-container">
			<button type="submit">Create Account</button>
			<p id="login-message">Already have an account? <a>Log In</a></p>
		</div>

	</div>



	<script src="script.js"></script>
</body>
</html>
